<script>
    const DATA = {
        İstanbul: {
            stops: ["Kadıköy", "Beşiktaş", "Zincirlikuyu", "Üsküdar"],
            prefix: "İETT",
        },
        Ankara: {
            stops: ["Kızılay", "AŞTİ", "Ulus", "Çayyolu"],
            prefix: "EGO",
        },
        İzmir: {
            stops: ["Konak", "Alsancak", "Bornova", "Karşıyaka"],
            prefix: "ESHOT",
        },
    };

    function updateBusList() {
        const city = document.getElementById("citySelect").value;
        const stopSelect = document.getElementById("stopSelect");
        const busList = document.getElementById("busList");

        // Durakları şehre göre güncelle (Eğer şehir değiştiyse)
        if (stopSelect.getAttribute("data-city") !== city) {
            stopSelect.innerHTML = DATA[city].stops
                .map((s) => `<option>${s}</option>`)
                .join("");
            stopSelect.setAttribute("data-city", city);
        }

        // Akıllı Hat Listesi Oluşturma
        busList.innerHTML = [1, 2, 3]
            .map((i) => {
                const occupancy = Math.floor(Math.random() * 85) + 10;
                const comfortScore = 100 - occupancy; // Basit bir mühendislik metriği
                const waitTime = Math.floor(Math.random() * 12) + 2;
                const carbonSaved = (Math.random() * 2).toFixed(1);

                let colorClass =
                    occupancy > 75
                        ? "text-red-500"
                        : occupancy > 45
                          ? "text-yellow-500"
                          : "text-green-500";
                let bgColor = occupancy > 75 ? "bg-red-500/10" : "bg-slate-900";

                return `
                <div class="card p-6 flex flex-col md:flex-row justify-between items-center ${bgColor} border-l-4 ${occupancy > 75 ? "border-l-red-500" : "border-l-sky-500"}">
                    <div class="mb-4 md:mb-0">
                        <div class="flex items-center gap-2">
                            <span class="bg-sky-500 text-slate-900 text-xs font-bold px-2 py-1 rounded">${DATA[city].prefix}</span>
                            <h3 class="font-bold text-xl text-white">Hat ${Math.floor(Math.random() * 400) + 100}</h3>
                        </div>
                        <p class="text-sm text-slate-400 mt-1"><i class="far fa-clock mr-1"></i> Bekleme: <b>${waitTime} dk</b></p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-center md:text-right">
                        <div>
                            <p class="text-xs text-slate-500 uppercase">Doluluk</p>
                            <p class="font-black text-lg ${colorClass}">%${occupancy}</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 uppercase">Konfor</p>
                            <p class="font-black text-lg text-sky-400">${comfortScore}/100</p>
                        </div>
                    </div>

                    <div class="mt-4 md:mt-0">
                        <button onclick="confirmRoute('${carbonSaved}')" class="btn-action px-6 py-2 shadow-lg shadow-sky-500/20">Hattı Seç</button>
                        <p class="text-[10px] text-green-400 mt-2 text-center">🍃 +${carbonSaved}kg CO2 Tasarrufu</p>
                    </div>
                </div>
            `;
            })
            .join("");
    }

    function confirmRoute(carbon) {
        alert(
            `Rota onaylandı!\nBu yolculukla doğaya ${carbon}kg daha az karbon salınımı yapacaksınız. 🌱`,
        );
    }

    // İlk yükleme
    window.onload = updateBusList;
</script>
