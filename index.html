<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FlowSync AI | Smart City</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        />
        <style>
            body {
                background-color: #0f172a;
                color: #f8fafc;
                font-family: "Inter", sans-serif;
            }
            .card {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 12px;
                transition: 0.3s;
            }
            .card:hover {
                border-color: #38bdf8;
            }
            .btn-action {
                background: #38bdf8;
                color: #0f172a;
                font-weight: bold;
                border-radius: 8px;
                transition: 0.3s;
                padding: 10px 20px;
            }
            .btn-action:hover {
                background: #7dd3fc;
                transform: translateY(-2px);
            }
            .hidden {
                display: none;
            }
            .active-tab {
                border-bottom: 2px solid #38bdf8;
                color: #38bdf8;
                font-weight: bold;
            }
        </style>
    </head>
    <body class="p-4 md:p-8">
        <header
            class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center"
        >
            <div>
                <h1 class="text-3xl font-bold text-sky-400">🌐 FlowSync AI</h1>
                <p class="text-slate-400">Akıllı Şehir & Lojistik Paneli</p>
            </div>
            <div
                id="clock"
                class="text-right font-mono text-sky-500 hidden md:block"
            ></div>
        </header>

        <nav class="flex gap-6 mb-8 text-sm uppercase tracking-widest">
            <button
                id="tab1-btn"
                onclick="switchTab(1)"
                class="pb-2 active-tab"
            >
                📱 Yolcu
            </button>
            <button id="tab2-btn" onclick="switchTab(2)" class="pb-2">
                🎮 Operatör
            </button>
        </nav>

        <div id="tab1">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="card p-6 h-fit">
                    <h2 class="text-xl mb-4 font-bold">
                        <i class="fas fa-search-location mr-2"></i>Rota Bul
                    </h2>
                    <label class="block text-xs text-slate-500 mb-1"
                        >Şehir</label
                    >
                    <select
                        id="citySelect"
                        onchange="loadStops()"
                        class="w-full bg-slate-900 border border-slate-700 p-2 rounded mb-4 outline-none"
                    >
                        <option value="İstanbul">İstanbul</option>
                        <option value="Ankara">Ankara</option>
                        <option value="İzmir">İzmir</option>
                    </select>
                    <label class="block text-xs text-slate-500 mb-1"
                        >Durak</label
                    >
                    <select
                        id="stopSelect"
                        onchange="generateBuses()"
                        class="w-full bg-slate-900 border border-slate-700 p-2 rounded mb-6 outline-none"
                    ></select>
                    <div
                        class="p-3 bg-sky-500/10 rounded text-xs text-sky-300 italic"
                    >
                        💡 İpucu: Düşük doluluklu araçları seçerek ekstra
                        "Eco-Point" kazanabilirsiniz.
                    </div>
                </div>
                <div id="busContainer" class="lg:col-span-2 space-y-4"></div>
            </div>
        </div>

        <div id="tab2" class="hidden">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="card p-4 text-center">
                    <p class="text-xs text-slate-500">Aktif Filo</p>
                    <p class="text-2xl font-bold">142</p>
                </div>
                <div class="card p-4 text-center border-b-4 border-sky-500">
                    <p class="text-xs text-slate-500">Gecikme</p>
                    <p class="text-2xl font-bold">1.2 dk</p>
                </div>
                <div class="card p-4 text-center border-b-4 border-green-500">
                    <p class="text-xs text-slate-500">Verimlilik</p>
                    <p class="text-2xl font-bold">%94</p>
                </div>
                <div class="card p-4 text-center border-b-4 border-red-500">
                    <p class="text-xs text-slate-500">Kritik Hat</p>
                    <p class="text-2xl font-bold text-red-500">500T</p>
                </div>
            </div>
            <div
                class="card p-6 border-2 border-red-500/50 bg-red-500/5 flex justify-between items-center"
            >
                <div>
                    <h3 class="font-bold text-red-400">
                        ⚠️ KRİTİK YOĞUNLUK TESPİTİ
                    </h3>
                    <p class="text-sm text-slate-400">
                        Hat 500T üzerindeki yolcu sayısı kapasiteyi aştı.
                    </p>
                </div>
                <button
                    onclick="alert('Yedek otobüs yönlendirildi!')"
                    class="bg-red-600 px-4 py-2 rounded font-bold hover:bg-red-500"
                >
                    Yedek Gönder
                </button>
            </div>
        </div>

        <script>
            const cityData = {
                İstanbul: ["Kadıköy", "Beşiktaş", "Zincirlikuyu", "Üsküdar"],
                Ankara: ["Kızılay", "AŞTİ", "Ulus", "Çayyolu"],
                İzmir: ["Konak", "Alsancak", "Bornova", "Karşıyaka"],
            };

            function switchTab(t) {
                document
                    .getElementById("tab1")
                    .classList.toggle("hidden", t !== 1);
                document
                    .getElementById("tab2")
                    .classList.toggle("hidden", t !== 2);
                document
                    .getElementById("tab1-btn")
                    .classList.toggle("active-tab", t === 1);
                document
                    .getElementById("tab2-btn")
                    .classList.toggle("active-tab", t === 2);
            }

            function loadStops() {
                const city = document.getElementById("citySelect").value;
                const stopSelect = document.getElementById("stopSelect");
                stopSelect.innerHTML = cityData[city]
                    .map((s) => `<option value="${s}">${s}</option>`)
                    .join("");
                generateBuses();
            }

            function generateBuses() {
                const container = document.getElementById("busContainer");
                container.innerHTML = "";
                for (let i = 0; i < 3; i++) {
                    const occ = Math.floor(Math.random() * 80) + 15;
                    const wait = Math.floor(Math.random() * 15) + 2;
                    const color =
                        occ > 70
                            ? "text-red-500"
                            : occ > 40
                              ? "text-yellow-500"
                              : "text-green-500";
                    container.innerHTML += `
                    <div class="card p-6 flex justify-between items-center border-l-4 ${occ > 70 ? "border-red-500" : "border-sky-500"}">
                        <div>
                            <h3 class="text-xl font-bold italic">Hat ${Math.floor(Math.random() * 400) + 100}</h3>
                            <p class="text-sm text-slate-500">Tahmini Varış: ${wait} dk</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black ${color}">%${occ} Dolu</p>
                            <button onclick="alert('Rota Planlandı!')" class="btn-action mt-2 text-sm px-4 py-1">Seç</button>
                        </div>
                    </div>
                `;
                }
            }

            setInterval(() => {
                document.getElementById("clock").innerText =
                    new Date().toLocaleTimeString();
            }, 1000);

            window.onload = loadStops;
        </script>
    </body>
</html>
